<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pptx2one - PPT 合并工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
body{font-family:DM Sans,sans-serif;background:#f3f4f6;margin:0;padding:32px 20px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:14px}
.drop-zone{text-align:center;padding:40px 24px;cursor:pointer;border:2px dashed #ccc;border-radius:14px}
.drop-zone.dragover{border-color:#7c3aed;background:#f5f3ff}
.btn{background:#7c3aed;color:#fff;border:none;padding:11px 0;border-radius:10px;font-size:15px;cursor:pointer;width:100%}
.btn:disabled{background:#c4b5fd}
.progress-bar{height:4px;background:#e5e7eb;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;width:0%;background:#7c3aed;border-radius:4px;transition:width .4s}
</style>
</head>
<body>
<div style="max-width:800px;margin:0 auto">
  <header>
    <h1>pptx<span style="color:#7c3aed">2</span>one</h1>
    <p>PPT 幻灯片合并工具</p>
  </header>
  <div class="card drop-zone" id="dropZone">
    <div style="font-size:36px">&#x1F4C4;</div>
    <p>拖拽 .pptx 文件到此处</p>
    <p>或点击下方按钮选择</p>
    <button class="btn" id="selectBtn" style="width:auto;padding:7px 20px">选择文件</button>
    <input type="file" id="fileInput" multiple accept=".pptx" hidden>
  </div>
  <div class="card" id="fileListWrap" style="display:none;margin-top:12px">
    <div style="padding:14px 18px 8px">
      <span>已选择 <span id="fileCount">0</span> 个文件</span>
      <button id="btnClear" style="float:right;border:none;background:none;color:#9ca3af;cursor:pointer">清空</button>
    </div>
    <div id="fileList"></div>
  </div>
  <div id="actionArea" style="display:none;margin-top:12px">
    <button class="btn" id="mergeBtn">合并并下载</button>
    <div class="progress-bar" style="margin-top:12px"><div class="progress-fill" id="progressFill"></div></div>
    <div id="status" style="text-align:center;font-size:13px;color:#6b7280;margin-top:8px"></div>
  </div>
  <div id="summaryBar" style="display:none;padding:12px 18px;margin-top:12px;border-radius:14px;">
    <span id="summaryMsg"></span>
    <button id="btnNew" style="float:right;border:none;border-radius:100px;background:#7c3aed;color:#fff;cursor:pointer;padding:4px 12px">重新开始</button>
  </div>
</div>
<script>
let fileItems = [];
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileListWrap = document.getElementById('fileListWrap');
const fileList = document.getElementById('fileList');
const fileCount = document.getElementById('fileCount');
const btnClear = document.getElementById('btnClear');
const actionArea = document.getElementById('actionArea');
const mergeBtn = document.getElementById('mergeBtn');
const progressFill = document.getElementById('progressFill');
const statusEl = document.getElementById('status');
const summaryBar = document.getElementById('summaryBar');
const summaryMsg = document.getElementById('summaryMsg');
const btnNew = document.getElementById('btnNew');

function setStatus(m,t){statusEl.textContent=m;statusEl.style.color=t==='error'?'#dc2626':t==='success'?'#059669':'#6b7280'}
function updateProgress(p,msg){progressFill.style.width=Math.min(100,Math.max(0,p))+'%'}
function showSummary(m,t){summaryMsg.textContent=m;summaryBar.style.display='flex';summaryBar.style.background=t==='error'?'#fef2f2':'#ecfdf5';summaryBar.style.color=t==='error'?'#dc2626':'#059669'}

document.getElementById('selectBtn').onclick=e=>{e.stopPropagation();fileInput.click()};
dropZone.onclick=()=>fileInput.click();
fileInput.onchange=()=>{if(fileInput.files.length)addFiles(fileInput.files);fileInput.value=''};
dropZone.ondragover=e=>{e.preventDefault();dropZone.classList.add('dragover')};
dropZone.ondragleave=()=>dropZone.classList.remove('dragover');
dropZone.ondrop=e=>{e.preventDefault();dropZone.classList.remove('dragover');if(e.dataTransfer.files.length)addFiles(e.dataTransfer.files)};
btnClear.onclick=()=>{fileItems=[];render()};
btnNew.onclick=()=>{fileItems=[];render();summaryBar.style.display='none';setStatus('')};

function addFiles(input){let added=false;for(const f of input){if(!f.name.toLowerCase().endsWith('.pptx'))continue;if(fileItems.some(it=>it.file===f||(it.name===f.name&&it.size===f.size)))continue;fileItems.push({file:f,name:f.name,size:f.size});added=true}if(added)render()}

function render(){const has=fileItems.length>0;fileListWrap.style.display=has?'block':'none';actionArea.style.display=has?'block':'none';if(!has){fileList.innerHTML='';fileCount.textContent='0';return}fileCount.textContent=fileItems.length;fileList.innerHTML='';fileItems.forEach((item,idx)=>{const div=document.createElement('div');div.draggable=true;div.style.cssText='display:flex;align-items:center;gap:10px;padding:8px 18px;border-top:1px solid #f0f0f0';div.innerHTML='<span style="width:22px;color:#9ca3af;text-align:center">'+(idx+1)+'</span><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+item.name+'</div><div style="font-size:12px;color:#9ca3af">'+(item.size<1024*1024?(item.size/1024).toFixed(1)+' KB':(item.size/1024/1024).toFixed(1)+' MB')+'</div></div><button style="border:none;background:none;color:#9ca3af;cursor:pointer">&#x2715;</button>';div.ondragstart=e=>{e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',idx);setTimeout(()=>div.style.opacity=0.3,0)};div.ondragend=()=>div.style.opacity=1;div.ondragover=e=>{e.preventDefault();e.dataTransfer.dropEffect='move';div.style.borderTop='2px solid #7c3aed'};div.ondragleave=()=>div.style.borderTop='1px solid #f0f0f0';div.ondrop=e=>{e.preventDefault();div.style.borderTop='1px solid #f0f0f0';const fi=parseInt(e.dataTransfer.getData('text/plain'));const ti=parseInt(div.dataset.index);if(fi!==ti){const[m]=fileItems.splice(fi,1);fileItems.splice(ti,0,m);render()}};div.querySelector('button').onclick=()=>{fileItems.splice(idx,1);render()};fileList.appendChild(div)})}

const P_NS='http://schemas.openxmlformats.org/presentationml/2006/main';
const R_NS='http://schemas.openxmlformats.org/officeDocument/2006/relationships';
const RELS_NS='http://schemas.openxmlformats.org/package/2006/relationships';
const CT_NS='http://schemas.openxmlformats.org/package/2006/content-types';
const RELS_SLIDE='http://schemas.openxmlformats.org/officeDocument/2006/relationships/slide';

async function performMerge(zips,outZip){
  for(const path in zips[0].files){if(!zips[0].files[path].dir)outZip.file(path,await zips[0].files[path].async('arraybuffer'))}
  if(zips.length===1)return;
  const presXml=new DOMParser().parseFromString(await outZip.files['ppt/presentation.xml'].async('string'),'application/xml');
  const presRelsXml=new DOMParser().parseFromString(await outZip.files['ppt/_rels/presentation.xml.rels'].async('string'),'application/xml');
  if(!presXml||!presRelsXml)throw new Error('无法解析 presentation.xml');
  let ns=0;Object.keys(outZip.files).filter(f=>/^ppt\/slides\/slide\d+\.xml$/i.test(f)).forEach(f=>{const n=parseInt(f.match(/slide(\d+)/i)[1]);if(n>ns)ns=n});
  ns++;
  let mr=0;[...presRelsXml.documentElement.getElementsByTagNameNS(RELS_NS,'Relationship')].forEach(r=>{const id=r.getAttribute('Id');if(id){const n=parseInt(id.replace('rId',''));if(n>mr)mr=n}});
  const sll=presXml.documentElement.getElementsByTagNameNS(P_NS,'sldIdLst')[0];
  let ms=0;if(sll){[...sll.getElementsByTagNameNS(P_NS,'sldId')].forEach(el=>{const v=parseInt(el.getAttribute('id'));if(v>ms)ms=v})}if(ms===0)ms=255;
  for(let di=1;di<zips.length;di++){
    const cz=zips[di];
    const cs=Object.keys(cz.files).filter(f=>/^ppt\/slides\/slide\d+\.xml$/i.test(f)).sort((a,b)=>parseInt(a.match(/\d+/)[0])-parseInt(b.match(/\d+/)[0]));
    if(!cs.length)continue;
    const mr2={},mfc={};
    for(const sp of cs){const sn=parseInt(sp.match(/\d+/)[0]),rp='ppt/slides/_rels/slide'+sn+'.xml.rels';if(!cz.files[rp])continue;const rd=new DOMParser().parseFromString(await cz.files[rp].async('string'),'application/xml');if(!rd)continue;[...rd.documentElement.getElementsByTagNameNS(RELS_NS,'Relationship')].forEach(r=>{const t=r.getAttribute('Target');if(!t||!t.startsWith('../media/'))return;if(!mr2[t]){const mp=t.substring(3);if(outZip.files[mp]){const nn='../media/'+di+'_'+t.substring(9);mr2[t]=nn;mfc[nn.substring(3)]=cz.files[mp]}else{mr2[t]=t;mfc[mp]=cz.files[mp]}}})}
    for(const[dp,ze]of Object.entries(mfc)){if(!outZip.files[dp])outZip.file(dp,await ze.async('arraybuffer'))}
    for(let si=0;si<cs.length;si++){
      const sp=cs[si],sn=parseInt(sp.match(/\d+/)[0]),nn2=ns+si,nsp='ppt/slides/slide'+nn2+'.xml',nrp='ppt/slides/_rels/slide'+nn2+'.xml.rels',nrid='rId'+(++mr),nsid=++ms;
      outZip.file(nsp,await cz.files[sp].async('arraybuffer'));
      const orp='ppt/slides/_rels/slide'+sn+'.xml.rels';
      if(cz.files[orp]){let rt=await cz.files[orp].async('string');for(const[ot,nt]of Object.entries(mr2)){if(ot!==nt)rt=rt.split('Target="'+ot+'"').join('Target="'+nt+'"')}outZip.file(nrp,rt)}
      const se=presXml.createElementNS(P_NS,'p:sldId');se.setAttribute('id',''+nsid);se.setAttributeNS(R_NS,'r:id',nrid);sll.appendChild(se);
      const re=presRelsXml.createElementNS(RELS_NS,'Relationship');re.setAttribute('Id',nrid);re.setAttribute('Type',RELS_SLIDE);re.setAttribute('Target','slides/slide'+nn2+'.xml');presRelsRoot.appendChild(re);
      if(outZip.files['[Content_Types].xml']){const ct=new DOMParser().parseFromString(await outZip.files['[Content_Types].xml'].async('string'),'application/xml');if(ct){let exists=false;[...ct.documentElement.getElementsByTagNameNS(CT_NS,'Override')].forEach(o=>{if(o.getAttribute('PartName')==='/ppt/slides/slide'+nn2+'.xml')exists=true});if(!exists){const ov=ct.createElementNS(CT_NS,'Override');ov.setAttribute('PartName','/ppt/slides/slide'+nn2+'.xml');ov.setAttribute('ContentType','application/vnd.openxmlformats-officedocument.presentationml.slide+xml');ct.documentElement.appendChild(ov);outZip.file('[Content_Types].xml',new XMLSerializer().serializeToString(ct))}}}
    }ns+=cs.length
  }
  const presRelsRoot = presRelsXml.documentElement;
  outZip.file('ppt/presentation.xml',new XMLSerializer().serializeToString(presXml));
  outZip.file('ppt/_rels/presentation.xml.rels',new XMLSerializer().serializeToString(presRelsXml));
}

async function mergeAndDownload(){
  if(!fileItems.length){setStatus('请先选择 .pptx 文件','error');return}
  if(typeof JSZip==='undefined'){setStatus('JSZip 库加载失败','error');return}
  mergeBtn.disabled=true;mergeBtn.textContent='正在合并...';setStatus('');summaryBar.style.display='none';progressFill.style.width='0%'
  try{
    const zips=[];for(const item of fileItems)zips.push(await JSZip.loadAsync(item.file));
    setStatus('已加载 '+zips.length+' 个文档，开始合并...');
    const outZip=new JSZip();await performMerge(zips,outZip);
    setStatus('正在生成文件...');
    const blob=await outZip.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.presentationml.presentation'});
    const fn=(fileItems.length===1?fileItems[0].name.replace(/\.pptx$/i,''):'合并演示文稿')+'_merged.pptx';
    if(typeof saveAs!=='undefined'){saveAs(blob,fn)}else{const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=fn;a.click();URL.revokeObjectURL(u)}
    setStatus('下载已启动','success');showSummary('合并成功: '+fn,'success')
  }catch(err){console.error(err);setStatus(err.message||err,'error');showSummary('合并失败: '+(err.message||err),'error')}
  finally{mergeBtn.disabled=false;mergeBtn.textContent='合并并下载'}
}
mergeBtn.onclick=mergeAndDownload;
</script>
</body>
</html>
